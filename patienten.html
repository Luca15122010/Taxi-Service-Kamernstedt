<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patientendaten</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">EinsatzDoku</div>
    <nav class="topnav">
      <a href="index.html">Start</a>
      <a class="active" href="patienten.html">Patient</a>
      <a href="einsatz.html">Einsatz</a>
      <a href="medizin.html">Medizin</a>
      <a href="taetigkeiten.html">Tätigkeiten</a>
      <a href="skills.html">Skills</a>
      <a href="bericht.html">Bericht</a>
 <a class="active" href="checkliste.html">Checkliste</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="card form-page">
      <div class="section-head">
        <h1>Patientendaten</h1>
        <p>Basisdaten der betroffenen Person.</p>
      </div>

      <div class="form-grid">
        <label>Name<input type="text" placeholder="Vor- und Nachname" /></label>
        <label>Alter<input type="text" placeholder="Alter" /></label>
        <label>Geburtsdatum<input type="date" /></label>
        <label>Datum<input type="date" /></label>
        <label>Uhrzeit<input type="time" /></label>
        <label>Geschlecht<input type="text" placeholder="m / w / divers" /></label>
      </div>

      <label>Sonstige Notiz<textarea placeholder="Zusätzliche Angaben"></textarea></label>
      <div class="page-actions">
        <a class="btn ghost" href="index.html">Zur Startseite</a>
        <a class="btn" href="einsatz.html">Weiter</a>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
