  <main class="wrap">
    <section class="card form-page">
      <div class="section-head">
        <h1>Bericht</h1>
        <p>Reflexion, Hygiene und Abschluss der Dokumentation.</p>
      </div>

      <div class="checks cols2">
        <label><input type="checkbox" /> Mundschutz</label>
        <label><input type="checkbox" /> Handschuhe</label>
        <label><input type="checkbox" /> Schutzbrille</label>
        <label><input type="checkbox" /> Desinfektion lt. Hygieneplan</label>
        <label><input type="checkbox" /> Dokumentation via Tablet</label>
      </div>

      <label>Reflexion / Selbsteinschätzung<textarea placeholder="Wie sicher warst du bei den Maßnahmen?"></textarea></label>

      <div class="checks">
        <label><input type="radio" name="schaetzung" /> Ich habe die Maßnahmen sicher durchgeführt.</label>
        <label><input type="radio" name="schaetzung" /> Ich hatte leichte Unsicherheiten beim Durchführen der Maßnahmen.</label>
        <label><input type="radio" name="schaetzung" /> Ich habe viel Hilfe benötigt und fühlte mich gänzlich unsicher.</label>
        <label><input type="radio" name="schaetzung" /> Ich war komplett überfordert mit der Situation.</label>
      </div>

      <label>Erfolgserlebnisse<textarea placeholder="Was ist besonders gut gelungen?"></textarea></label>
      <label>Kommentare / Hinweise<textarea placeholder="Weitere Bemerkungen"></textarea></label>
      <label>Unterschrift<textarea placeholder="Hier erscheint die Unterschrift"></textarea></label>

      <div class="page-actions">
        <a class="btn ghost" href="skills.html">Zurück</a>
        <a class="btn" href="index.html">Zur Startseite</a>
      </div>
